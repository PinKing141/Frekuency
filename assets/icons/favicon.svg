<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" font-family="'Orbitron','Arial Black',sans-serif">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a0a32"/>
      <stop offset="1" stop-color="#0a0410"/>
    </linearGradient>
    <linearGradient id="fink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd9f6"/>
      <stop offset="0.5" stop-color="#ff5fd8"/>
      <stop offset="1" stop-color="#b56bff"/>
    </linearGradient>
    <filter id="fg" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#fbg)"/>
  <rect x="3" y="3" width="58" height="58" rx="14" fill="none" stroke="#ff4fe3" stroke-width="2" opacity="0.85" filter="url(#fg)"/>
  <text x="32" y="42" text-anchor="middle" font-size="30" font-weight="800"
        fill="url(#fink)" filter="url(#fg)">FQ</text>
  <polyline points="14,52 22,52 26,45 30,57 34,40 38,56 42,48 50,52"
            fill="none" stroke="#ff8af0" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" opacity="0.9" filter="url(#fg)"/>
</svg>
