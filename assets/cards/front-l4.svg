<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" width="500" height="700" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a000c"/>
      <stop offset="0.55" stop-color="#050006"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#ff4fe3" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ff4fe3" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="500" height="700" rx="40" fill="url(#bg)"/>
  <rect width="500" height="700" rx="40" fill="url(#halo)"/>

  <g fill="#ff4fe3" opacity="0.1">
    <rect x="150" y="320" width="14" height="60"  rx="7"/>
    <rect x="176" y="290" width="14" height="120" rx="7"/>
    <rect x="202" y="250" width="14" height="200" rx="7"/>
    <rect x="228" y="300" width="14" height="100" rx="7"/>
    <rect x="254" y="240" width="14" height="220" rx="7"/>
    <rect x="280" y="285" width="14" height="130" rx="7"/>
    <rect x="306" y="255" width="14" height="190" rx="7"/>
    <rect x="332" y="300" width="14" height="100" rx="7"/>
  </g>

  <g filter="url(#glow)">
    <rect x="18" y="18" width="464" height="664" rx="34" fill="none" stroke="#ff4fe3" stroke-width="2"   opacity="0.7"/>
    <rect x="24" y="24" width="452" height="652" rx="30" fill="none" stroke="#ff4fe3" stroke-width="4.5" opacity="0.98"/>
  </g>
  <rect x="34" y="34" width="432" height="632" rx="24" fill="none" stroke="#ff8af0" stroke-width="1.2" opacity="0.5"/>

  <g fill="#ff4fe3" filter="url(#glow)">
    <circle cx="24"  cy="24"  r="7"/>
    <circle cx="476" cy="24"  r="7"/>
    <circle cx="24"  cy="676" r="7"/>
    <circle cx="476" cy="676" r="7"/>
  </g>

  <line x1="120" y1="120" x2="380" y2="120" stroke="#ff4fe3" stroke-width="2" opacity="0.55" filter="url(#glow)"/>
  <line x1="150" y1="600" x2="350" y2="600" stroke="#ff4fe3" stroke-width="2" opacity="0.5"  filter="url(#glow)"/>
</svg>
