<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" width="500" height="700" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b0816"/>
      <stop offset="0.55" stop-color="#12050f"/>
      <stop offset="1" stop-color="#0a040a"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.3" r="0.75">
      <stop offset="0" stop-color="#ff5fc2" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#ff5fc2" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="500" height="700" rx="40" fill="url(#bg)"/>
  <rect width="500" height="700" rx="40" fill="url(#halo)"/>

  <g fill="#ff5fc2" opacity="0.08">
    <rect x="150" y="320" width="14" height="60"  rx="7"/>
    <rect x="176" y="290" width="14" height="120" rx="7"/>
    <rect x="202" y="250" width="14" height="200" rx="7"/>
    <rect x="228" y="300" width="14" height="100" rx="7"/>
    <rect x="254" y="240" width="14" height="220" rx="7"/>
    <rect x="280" y="285" width="14" height="130" rx="7"/>
    <rect x="306" y="255" width="14" height="190" rx="7"/>
    <rect x="332" y="300" width="14" height="100" rx="7"/>
  </g>

  <g filter="url(#glow)">
    <rect x="24" y="24" width="452" height="652" rx="30" fill="none" stroke="#ff5fc2" stroke-width="4" opacity="0.95"/>
  </g>
  <rect x="34" y="34" width="432" height="632" rx="24" fill="none" stroke="#ff5fc2" stroke-width="1.2" opacity="0.4"/>

  <g fill="#ff5fc2" filter="url(#glow)">
    <circle cx="24"  cy="24"  r="6"/>
    <circle cx="476" cy="24"  r="6"/>
    <circle cx="24"  cy="676" r="6"/>
    <circle cx="476" cy="676" r="6"/>
  </g>

  <line x1="120" y1="120" x2="380" y2="120" stroke="#ff5fc2" stroke-width="2" opacity="0.5"  filter="url(#glow)"/>
  <line x1="150" y1="600" x2="350" y2="600" stroke="#ff5fc2" stroke-width="2" opacity="0.45" filter="url(#glow)"/>
</svg>
