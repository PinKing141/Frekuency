<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" width="500" height="700" preserveAspectRatio="xMidYMid slice" font-family="'Orbitron','Arial Black',sans-serif">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#190620"/>
      <stop offset="0.5" stop-color="#0e0414"/>
      <stop offset="1" stop-color="#04020a"/>
    </linearGradient>
    <radialGradient id="bcore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff4fe3" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff4fe3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd9f6"/>
      <stop offset="0.5" stop-color="#ff5fd8"/>
      <stop offset="1" stop-color="#b56bff"/>
    </linearGradient>
    <filter id="bglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bglow2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="500" height="700" rx="40" fill="url(#bbg)"/>
  <rect x="250" y="350" width="520" height="520" fill="url(#bcore)" transform="translate(-260 -260)"/>

  <g fill="none" stroke="#ff4fe3" filter="url(#bglow)">
    <rect x="22" y="22" width="456" height="656" rx="30" stroke-width="3.5" opacity="0.95"/>
    <rect x="33" y="33" width="434" height="634" rx="22" stroke-width="1" opacity="0.4"/>
  </g>

  <g stroke="#ff4fe3" stroke-width="1" opacity="0.18">
    <line x1="60" y1="60" x2="200" y2="200"/>
    <line x1="440" y1="60" x2="300" y2="200"/>
    <line x1="60" y1="640" x2="200" y2="500"/>
    <line x1="440" y1="640" x2="300" y2="500"/>
  </g>

  <g transform="translate(250 350)">
    <circle r="150" fill="none" stroke="#b56bff" stroke-width="1.4" opacity="0.45" filter="url(#bglow2)"/>
    <circle r="124" fill="none" stroke="#ff4fe3" stroke-width="2.2" opacity="0.9" filter="url(#bglow)"/>
    <circle r="100" fill="#0a0410" opacity="0.6"/>

    <g fill="#ff8af0" filter="url(#bglow)">
      <circle cx="0" cy="-150" r="4"/>
      <circle cx="0" cy="150" r="4"/>
      <circle cx="-150" cy="0" r="4"/>
      <circle cx="150" cy="0" r="4"/>
    </g>

    <text x="0" y="26" text-anchor="middle" font-size="120" font-weight="800"
          fill="url(#bink)" filter="url(#bglow)" letter-spacing="2">FQ</text>

    <polyline points="-66,52 -50,52 -40,30 -30,72 -20,18 -10,84 0,40 10,66 20,48 32,52 66,52"
              fill="none" stroke="#ffd9f6" stroke-width="3" stroke-linecap="round"
              stroke-linejoin="round" filter="url(#bglow)"/>
  </g>

  <text x="250" y="636" text-anchor="middle" font-size="22" font-weight="700"
        fill="#ff8af0" letter-spacing="8" opacity="0.92" filter="url(#bglow2)">FREAKQUENCY</text>

  <g fill="#ff4fe3" filter="url(#bglow)">
    <circle cx="22" cy="22" r="5.5"/>
    <circle cx="478" cy="22" r="5.5"/>
    <circle cx="22" cy="678" r="5.5"/>
    <circle cx="478" cy="678" r="5.5"/>
  </g>
</svg>
